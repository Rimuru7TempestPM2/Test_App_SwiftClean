<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftClean App</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .nav-btn.active { color: #0ea5e9; border-bottom: 3px solid #0ea5e9; }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <header class="bg-white p-6 pt-10 text-center rounded-b-[2rem] shadow-sm">
        <img src="logo.jpg" class="w-20 h-20 mx-auto rounded-full shadow-md mb-2">
        <h1 class="text-xl font-black text-gray-800 uppercase">SwiftClean</h1>
        <div class="flex justify-center gap-8 mt-4 border-t pt-4">
            <button onclick="showTab('book')" id="tab-book" class="nav-btn active font-bold pb-2">BOOKING</button>
            <button onclick="showTab('track')" id="tab-track" class="nav-btn font-bold pb-2">TRACK ORDER</button>
        </div>
    </header>

    <main id="view-book" class="max-w-md mx-auto p-5 space-y-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm">
            <input type="text" id="cust-name" placeholder="Your Name" class="w-full p-4 bg-gray-50 border rounded-2xl mb-3 outline-none">
            <input type="tel" id="cust-phone" placeholder="Phone Number" class="w-full p-4 bg-gray-50 border rounded-2xl mb-3 outline-none">
            <textarea id="location-desc" placeholder="Location in Thika" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none"></textarea>
        </section>
        <div id="services-master" class="space-y-6"></div>
    </main>

    <main id="view-track" class="hidden max-w-md mx-auto p-5 space-y-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm">
            <h2 class="font-bold mb-4">Search your order</h2>
            <div class="flex gap-2">
                <input type="tel" id="search-phone" placeholder="Enter Phone Number" class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none">
                <button onclick="trackOrder()" class="bg-blue-600 text-white px-6 rounded-2xl font-bold">🔍</button>
            </div>
        </section>
        <div id="track-results" class="space-y-4"></div>
    </main>

    <div id="footer-book" class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-2xl z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div><p class="text-[10px] text-gray-400 font-bold">TOTAL</p><p id="total-price" class="text-2xl font-black text-blue-600">Ksh 0</p></div>
            <button id="submit-btn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black">BOOK NOW</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = {};
        function showTab(tab) {
            document.getElementById('view-book').classList.toggle('hidden', tab !== 'book');
            document.getElementById('view-track').classList.toggle('hidden', tab !== 'track');
            document.getElementById('footer-book').classList.toggle('hidden', tab !== 'book');
            document.getElementById('tab-book').classList.toggle('active', tab === 'book');
            document.getElementById('tab-track').classList.toggle('active', tab === 'track');
        }

        async function trackOrder() {
            const phone = document.getElementById('search-phone').value;
            const container = document.getElementById('track-results');
            if(!phone) return alert("Enter your phone number");
            
            container.innerHTML = "<p class='text-center text-gray-400 animate-pulse'>Searching database...</p>";
            
            try {
                const response = await fetch(`${window.config.webAppUrl}?action=track&phone=${phone}`);
                const data = await response.json();
                
                if(data.length === 0) {
                    container.innerHTML = "<div class='bg-orange-50 p-6 rounded-2xl text-center text-orange-700 font-bold'>No orders found for this number.</div>";
                    return;
                }

                container.innerHTML = data.map(order => `
                    <div class="bg-white p-5 rounded-2xl border shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold text-gray-400">${order.date}</span>
                            <span class="status-pill ${order.status.includes('READY') ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${order.status}</span>
                        </div>
                        <p class="text-sm font-bold text-gray-800">${order.services}</p>
                        <p class="text-blue-600 font-black mt-2 text-right">Ksh ${order.total}</p>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = "<p class='text-red-500'>Error connecting to system.</p>";
            }
        }
        
        // ... Keep your existing toggleItem, changeQty, and submit-btn logic from the previous index.html ...
    </script>
</body>
</html>
