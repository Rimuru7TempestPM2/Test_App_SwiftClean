<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftClean App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0ea5e9">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        input, textarea { user-select: text; -webkit-user-select: text; }
        .service-card.active { border-color: #0ea5e9; background-color: #f0f9ff; transform: scale(0.98); }
        .qty-btn { width: 36px; height: 36px; border-radius: 10px; background: #e2e8f0; font-weight: bold; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 pb-40">

    <header class="bg-white p-8 pt-12 text-center rounded-b-[3rem] shadow-sm border-b">
        <img src="1000129100.jpg" alt="Logo" class="w-24 h-24 mx-auto rounded-full shadow-lg border-4 border-white mb-4">
        <h1 id="biz-name" class="text-2xl font-black text-gray-800 uppercase tracking-tight"></h1>
        <p id="biz-tagline" class="text-xs font-medium text-blue-500"></p>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
        <section class="bg-white p-6 rounded-[2rem] shadow-sm animate-up">
            <h2 class="font-black text-gray-800 mb-4 flex items-center gap-2">Contact Details</h2>
            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Your Name" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
                <input type="tel" id="cust-phone" placeholder="Phone Number" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
                <textarea id="location-desc" placeholder="Location/Estate in Thika" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500"></textarea>
            </div>
        </section>

        <div id="services-master" class="space-y-8 animate-up" style="animation-delay: 0.1s;"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t p-6 shadow-2xl z-50 rounded-t-[2rem]">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total Estimated</p>
                <p id="total-price" class="text-2xl font-black text-blue-600">Ksh 0</p>
            </div>
            <button id="submit-btn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">
                BOOK NOW
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = {};
        
        document.addEventListener('DOMContentLoaded', () => {
            const cfg = window.config;
            document.getElementById('biz-name').textContent = cfg.businessName;
            document.getElementById('biz-tagline').textContent = cfg.tagline;
            
            const master = document.getElementById('services-master');
            cfg.categories.forEach(cat => {
                let html = `<div class="mb-6"><h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 px-2">${cat.name}</h3><div class="grid gap-3">`;
                cat.items.forEach(item => {
                    html += `
                        <div id="card-${item.id}" class="service-card bg-white p-5 rounded-2xl border transition-all" onclick="toggleItem('${item.id}')">
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="font-bold text-gray-800 block">${item.name}</span>
                                    <span class="text-[10px] text-blue-500 font-bold uppercase">${item.price}/- ${item.unit}</span>
                                </div>
                                <div id="qty-ctrl-${item.id}" class="hidden flex items-center gap-3" onclick="event.stopPropagation()">
                                    <button onclick="changeQty('${item.id}', -1)" class="qty-btn">-</button>
                                    <span id="qty-val-${item.id}" class="font-bold">1</span>
                                    <button onclick="changeQty('${item.id}', 1)" class="qty-btn">+</button>
                                </div>
                            </div>
                        </div>`;
                });
                master.innerHTML += html + `</div></div>`;
            });
        });

        function findItem(id) { 
            for (let cat of window.config.categories) { 
                let found = cat.items.find(i => i.id === id); if (found) return found; 
            } 
        }

        function toggleItem(id) {
            const item = findItem(id);
            if (cart[id]) {
                delete cart[id];
                document.getElementById(`card-${id}`).classList.remove('active');
                document.getElementById(`qty-ctrl-${id}`).classList.add('hidden');
            } else {
                cart[id] = 1;
                document.getElementById(`card-${id}`).classList.add('active');
                if (item.type === 'qty') document.getElementById(`qty-ctrl-${id}`).classList.remove('hidden');
            }
            updateTotal();
        }

        function changeQty(id, delta) {
            cart[id] = Math.max(1, cart[id] + delta);
            document.getElementById(`qty-val-${id}`).textContent = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            for (let id in cart) { total += (findItem(id).price * cart[id]); }
            document.getElementById('total-price').textContent = `Ksh ${total}`;
        }

        document.getElementById('submit-btn').addEventListener('click', async function() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const loc = document.getElementById('location-desc').value;
            const tot = document.getElementById('total-price').textContent;

            if(!name || !phone || Object.keys(cart).length === 0) return alert("Please fill details and select items.");

            this.textContent = "BOOKING...";
            let summary = Object.keys(cart).map(id => `${findItem(id).name} (x${cart[id]})`).join(", ");
            
            const url = `${window.config.webAppUrl}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&estate=${encodeURIComponent(loc)}&services=${encodeURIComponent(summary)}&totalPrice=${encodeURIComponent(tot)}`;
            
            fetch(url, { mode: 'no-cors' });
            
            setTimeout(() => {
                const msg = `*NEW LAUNDRY ORDER*\nClient: ${name}\nLocation: ${loc}\nItems: ${summary}\nTotal: ${tot}`;
                window.location.href = `https://wa.me/${window.config.whatsappNumber}?text=${encodeURIComponent(msg)}`;
            }, 1000);
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
